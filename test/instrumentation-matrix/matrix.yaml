schemaVersion: 1

providers:
  traceloop:
    versions: ["0.60.0"]
    contractSchema: "v1"

frameworks:
  - name: langchain
    package: langchain
    versions: ["0.3.27"]
    samplePath: cells/langchain_sample.py
    spanKinds: [llm]
    cassette: llm_chat_completion
    extras: [langchain-openai, openai]

  - name: langgraph
    package: langgraph
    versions: ["0.2.74"]
    samplePath: cells/langgraph_sample.py
    spanKinds: [llm, tool]
    cassette: agent_with_tools
    extras: [langchain-openai, langchain-core, openai]

  - name: llama-index
    package: llama-index
    versions: ["0.12.0"]
    samplePath: cells/llama_index_sample.py
    spanKinds: [llm, embedding]
    cassette: rag_pipeline
    extras: [llama-index-llms-openai, llama-index-embeddings-openai, openai]

  # CrewAI cell is deferred for v1. Two upstream incompatibilities surfaced
  # by the matrix make every (crewai × traceloop 0.60) combo unworkable:
  #
  #   * crewai < 1.0  → Traceloop's CrewAI instrumentation refuses to attach
  #     ("DependencyConflict: requested: 'crewai >= 1.0.0'"), so only generic
  #     LLM spans are emitted — no agent / crewaitask / tool spans.
  #   * crewai >= 1.0 → crewai pins opentelemetry-api ~=1.34, while
  #     traceloop-sdk 0.60.0 pins opentelemetry-api >=1.38, <2. pip refuses
  #     to resolve the install.
  #
  # Re-add the cell once Traceloop ships a release with compatible
  # opentelemetry-api ranges. The sample + recording script stay on disk
  # (cells/crewai_sample.py, scripts/record_cassette.py) so the work isn't lost.

  - name: openai-direct
    package: openai
    versions: ["1.55.0"]
    samplePath: cells/openai_direct_sample.py
    spanKinds: [llm]
    cassette: chat
    extras: []

  - name: anthropic-direct
    package: anthropic
    versions: ["0.40.0"]
    samplePath: cells/anthropic_direct_sample.py
    spanKinds: [llm]
    cassette: messages
    extras: []

python:
  versions: ["3.11"]

defaultCell:
  provider: traceloop
  providerVersion: "0.60.0"
  framework: langchain
  frameworkVersion: "0.3.27"
  python: "3.11"

heavyTier:
  perTraceloopVersion: 1
  perFramework: 1

known-broken: []
