name: Nightly Dev Build

run-name: Nightly Dev Build #${{ github.run_number }}

on:
  schedule:
    - cron: '0 0 * * *' # midnight UTC
  workflow_dispatch: {}

concurrency:
  group: nightly
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  REGISTRY_ORG: wso2
  HELM_REGISTRY: oci://ghcr.io/wso2

jobs:
  # Compute the dated version string once; all jobs consume it via needs.
  compute-version:
    name: Compute Version
    runs-on: ubuntu-latest
    outputs:
      dev-version: ${{ steps.version.outputs.dev-version }}
    steps:
      - name: Compute dev version
        id: version
        run: |
          DEV_VERSION="0.0.0-dev-$(date -u +%Y%m%d)"
          echo "dev-version=$DEV_VERSION" >> "$GITHUB_OUTPUT"
          echo "✅ Dev version: $DEV_VERSION"

  # Delete previous nightly Docker/OCI image tags (0.0.0-dev-*) from all packages
  # before building new ones so stale dated tags don't accumulate.
  cleanup-images:
    name: Cleanup Previous Nightly Images
    needs: compute-version
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        package:
          - amp-api
          - amp-console
          - amp-traces-observer
          - amp-quick-start
          - amp-evaluation-monitor
          - wso2-agent-manager
          - wso2-amp-observability-extension
          - wso2-amp-platform-resources-extension
          - wso2-amp-thunder-extension
          - wso2-amp-evaluation-extension
          - wso2-amp-api-platform-gateway-extension
    steps:
      - name: Delete previous 0.0.0-dev-* tags for ${{ matrix.package }}
        uses: dataaxiom/ghcr-cleanup-action@d52806a0dc70b430571a37da1fde39733ffd640f # v1.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          owner: ${{ env.REGISTRY_ORG }}
          package: ${{ matrix.package }}
          delete-tags: '0.0.0-dev-*'
          delete-untagged: false

  # Delete the previous nightly git tag before creating the new dated one.
  cleanup-git-tag:
    name: Cleanup Previous Nightly Git Tag
    needs: compute-version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete previous nightly git tags
        env:
          TODAY_TAG: amp/v${{ needs.compute-version.outputs.dev-version }}
        run: |
          # Delete all remote amp/v0.0.0-dev-* tags except today's (which doesn't exist yet)
          git ls-remote --tags origin 'refs/tags/amp/v0.0.0-dev-*' \
            | awk '{print $2}' \
            | sed 's|refs/tags/||' \
            | grep -v "^${TODAY_TAG}$" \
            | while read -r tag; do
                echo "Deleting tag: $tag"
                git push origin --delete "refs/tags/$tag" || echo "⚠️ Could not delete $tag (may not exist)"
              done
          echo "✅ Previous nightly git tags cleaned"

  # Load release-config.json and emit job matrices (mirrors release.yml pattern).
  load-config:
    name: Load Config
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.set-matrix.outputs.images }}
      charts: ${{ steps.set-matrix.outputs.charts }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Load configuration and set matrix
        id: set-matrix
        run: |
          CONFIG_FILE=".github/release-config.json"
          CHARTS_BASE_PATH=$(jq -r '.config["charts-base-path"]' "$CONFIG_FILE")

          IMAGES=$(jq -c --arg base "$CHARTS_BASE_PATH" '[.images[] | {
            name: .name,
            "service-dir": .dir,
            dockerfile: (.dir + "/Dockerfile"),
            context: (.context // "")
          }]' "$CONFIG_FILE")

          CHARTS=$(jq -c --arg base "$CHARTS_BASE_PATH" '[.charts[] | {
            name: .,
            path: ($base + "/" + .),
            "chart-file": ($base + "/" + . + "/Chart.yaml")
          }]' "$CONFIG_FILE")

          echo "images=$IMAGES" >> "$GITHUB_OUTPUT"
          echo "charts=$CHARTS" >> "$GITHUB_OUTPUT"

  build-images:
    name: Build ${{ matrix.image.name }}
    needs: [compute-version, cleanup-images, load-config]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.load-config.outputs.images) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image.name }}
        if: hashFiles(matrix.image.dockerfile) != ''
        uses: ./.github/actions/build-docker-image
        with:
          service-dir: ${{ matrix.image.service-dir }}
          image-name: ${{ matrix.image.name }}
          registry: ${{ env.REGISTRY }}
          registry-org: ${{ env.REGISTRY_ORG }}
          tag: ${{ needs.compute-version.outputs.dev-version }}
          context: ${{ matrix.image.context }}

  package-charts:
    name: Package ${{ matrix.chart.name }}
    needs: [compute-version, build-images, load-config]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        chart: ${{ fromJson(needs.load-config.outputs.charts) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.14.0'

      - name: Cache Helm chart dependencies
        if: hashFiles(format('{0}/Chart.lock', matrix.chart.path)) != ''
        uses: actions/cache@v5
        with:
          path: ${{ matrix.chart.path }}/charts
          key: helm-charts-${{ hashFiles(format('{0}/Chart.lock', matrix.chart.path)) }}

      - name: Patch chart image tags
        env:
          DEV_VERSION: ${{ needs.compute-version.outputs.dev-version }}
        run: |
          # Substitute 0.0.0-dev image tags with the dated nightly tag.
          # Unlike release.yml (which prepends v), nightly images have no v prefix.
          find ./deployments/helm-charts -name "values.yaml" -type f | while read -r f; do
            sed -i.bak "s|tag: \"0\.0\.0-dev\"|tag: \"${DEV_VERSION}\"|g" "$f"
            rm -f "${f}.bak"
          done
          echo "✅ Patched image tags to ${DEV_VERSION}"

      - name: Package and push ${{ matrix.chart.name }}
        if: hashFiles(matrix.chart.chart-file) != ''
        run: |
          bash .github/scripts/package-helm-chart.sh \
            "$CHART_PATH" \
            "$DEV_VERSION" \
            "$HELM_REGISTRY" \
            "$HELM_TOKEN"
        env:
          CHART_PATH: ${{ matrix.chart.path }}
          DEV_VERSION: ${{ needs.compute-version.outputs.dev-version }}
          HELM_REGISTRY: ${{ env.HELM_REGISTRY }}
          HELM_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-dev-tag:
    name: Update Nightly Git Tag
    needs: [compute-version, cleanup-git-tag]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Create nightly git tag
        env:
          DEV_VERSION: ${{ needs.compute-version.outputs.dev-version }}
        run: |
          TAG="amp/v${DEV_VERSION}"
          COMMIT_SHA=$(git rev-parse HEAD)
          # Delete existing tag if present locally or remotely (idempotent — safe to re-run same day)
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag -d "$TAG"
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            git push origin --delete "refs/tags/$TAG"
          fi
          git tag -a "$TAG" -m "Nightly dev build ${DEV_VERSION} from main at ${COMMIT_SHA:0:7}"
          git push origin "$TAG"
          echo "✅ Created tag $TAG at ${COMMIT_SHA:0:7}"

  e2e:
    name: E2E
    needs: [compute-version, package-charts, update-dev-tag]
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: ./.github/actions/setup-go

      - name: Install k3d
        env:
          K3D_VERSION: v5.8.3
          K3D_SHA256: dbaa79a76ace7f4ca230a1ff41dc7d8a5036a8ad0309e9c54f9bf3836dbe853e
        run: |
          curl -fsSL -o /tmp/k3d "https://github.com/k3d-io/k3d/releases/download/${K3D_VERSION}/k3d-linux-amd64"
          echo "${K3D_SHA256}  /tmp/k3d" | sha256sum -c -
          sudo install /tmp/k3d /usr/local/bin/k3d
          k3d version

      - name: Install yq
        env:
          YQ_VERSION: v4.45.4
          YQ_SHA256: b96de04645707e14a12f52c37e6266832e03c29e95b9b139cddcae7314466e69
        run: |
          curl -fsSL -o /tmp/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          echo "${YQ_SHA256}  /tmp/yq" | sha256sum -c -
          sudo install /tmp/yq /usr/local/bin/yq

      - name: Install platform
        env:
          VERSION: ${{ needs.compute-version.outputs.dev-version }}
        run: |
          cd deployments/quick-start && bash install.sh

      - name: Run e2e tests
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.INSTRUMENTATION_TEST_OPENAI_API_KEY }}
        run: |
          set -o pipefail
          cd test/e2e && go run github.com/onsi/ginkgo/v2/ginkgo -v -p --timeout 45m \
            --poll-progress-after=600s --keep-going --junit-report=report.xml \
            ./tests/... 2>&1 | tee e2e-output.log

      - name: Dump pod logs on failure
        if: failure()
        run: |
          mkdir -p /tmp/pod-logs
          kubectl logs deployment/amp-api -n wso2-amp --tail=500 --all-containers=true > /tmp/pod-logs/amp-api.txt 2>&1 || true
          kubectl logs deployment/openchoreo-api -n openchoreo-control-plane --tail=500 --all-containers=true > /tmp/pod-logs/openchoreo-api.txt 2>&1 || true
          kubectl logs deployment/amp-traces-observer -n openchoreo-observability-plane --tail=500 --all-containers=true > /tmp/pod-logs/amp-traces-observer.txt 2>&1 || true
          kubectl logs deployment/observer -n openchoreo-observability-plane --tail=500 --all-containers=true > /tmp/pod-logs/observer.txt 2>&1 || true
          # openchoreo reconciler (drives data-plane Release/ReleaseBinding rollout)
          kubectl logs deployment/openchoreo-controller-manager -n openchoreo-control-plane --tail=500 --all-containers=true > /tmp/pod-logs/openchoreo-controller-manager.txt 2>&1 || true
          # Cluster-wide pod state, plus Warning events only (surfaces stuck data-plane agent rollouts)
          kubectl get pods -A -o wide > /tmp/pod-logs/all-pods.txt 2>&1 || true
          kubectl get events -A --field-selector type=Warning --sort-by=.lastTimestamp > /tmp/pod-logs/warning-events.txt 2>&1 || true
          for pod in $(kubectl get pods -n workflows-default --no-headers -o custom-columns=":metadata.name" 2>/dev/null); do
            kubectl logs "$pod" -n workflows-default --all-containers=true --tail=200 > "/tmp/pod-logs/wf-pod-${pod}.txt" 2>&1 || true
          done

      - name: Upload pod logs
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: pod-logs
          path: /tmp/pod-logs/
          retention-days: 7

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@6e6a65b7a0bd2c9197df7d0ae36ac5cee784230c # v2.0.0
        with:
          name: Nightly E2E Test Results
          path: test/e2e/report.xml
          reporter: java-junit

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: e2e-test-logs
          path: test/e2e/e2e-output.log
          retention-days: 7

  notify-google-chat:
    name: Notify Google Chat
    needs: [compute-version, e2e]
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && needs.e2e.result == 'failure' }}
    steps:
      - name: Post failure alert
        env:
          GCHAT_WEBHOOK_URL: ${{ secrets.GCHAT_WEBHOOK_URL }}
          DEV_VERSION: ${{ needs.compute-version.outputs.dev-version }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "${GCHAT_WEBHOOK_URL}" ]; then
            echo "::warning::GCHAT_WEBHOOK_URL secret is not set; skipping Chat notification."
            exit 0
          fi
          curl -s -X POST "${GCHAT_WEBHOOK_URL}" \
            -H 'Content-Type: application/json' \
            -d "{
              \"text\": \"*🔴 Nightly E2E failed* — \`${DEV_VERSION}\`\n<${RUN_URL}|View run>\"
            }"
