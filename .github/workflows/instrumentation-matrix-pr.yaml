name: Instrumentation matrix — PR

on:
  pull_request:
    paths:
      - 'python-instrumentation-provider/**'
      - 'libs/amp-instrumentation/**'
      - 'samples/manual-instrumentation-agent/**'
      - '.github/release-config.json'
      - 'test/instrumentation-matrix/**'
      - 'traces-observer-service/**'
  push:
    branches: [main]
    paths:
      - 'python-instrumentation-provider/**'
      - 'libs/amp-instrumentation/**'
      - 'samples/manual-instrumentation-agent/**'
      - '.github/release-config.json'
      - 'test/instrumentation-matrix/**'
      - 'traces-observer-service/**'

concurrency:
  group: instrumentation-matrix-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  drift-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-go
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pyyaml
      - run: make check-contract-drift
      - run: make check-matrix-manifest

  check-default-cell:
    runs-on: ubuntu-latest
    needs: drift-checks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install nox
        run: pip install nox
      - name: Resolve default cell id
        id: default
        working-directory: test/instrumentation-matrix
        run: |
          python -c "
          from harness.manifest import load_manifest
          m = load_manifest('matrix.yaml')
          d = m.default_cell
          print(f'cell={d.provider}-{d.provider_version}-{d.framework}-{d.framework_version}-py{d.python}')
          " >> $GITHUB_OUTPUT
      - name: Run default cell
        working-directory: test/instrumentation-matrix
        run: nox -s emission -- --cell-id=${{ steps.default.outputs.cell }}
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: default-cell-report
          path: test/instrumentation-matrix/reports/

  emission-matrix:
    runs-on: ubuntu-latest
    needs: drift-checks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: |
            3.10
            3.11
            3.12
            3.13
      - run: pip install nox
      - name: Run full emission matrix
        working-directory: test/instrumentation-matrix
        run: nox -s emission
        continue-on-error: true   # advisory; check-default-cell is the gating job
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: matrix-reports
          path: test/instrumentation-matrix/reports/

  matrix-report:
    runs-on: ubuntu-latest
    needs: [emission-matrix, check-default-cell]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install nox pyyaml
      - uses: actions/download-artifact@v4
        with:
          name: matrix-reports
          path: test/instrumentation-matrix/reports/
      - name: Build summary
        working-directory: test/instrumentation-matrix
        run: nox -s report
      - name: Post / update PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: test/instrumentation-matrix/reports/summary.md

  cassette-leak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/check-cassettes.py
