---
# RestApi: Routes OTEL trace requests through the API Platform gateway with jwt-auth
# policy enforcement. Each gateway instance gets its own RestApi so traces from agents
# in any environment are authenticated and forwarded to the OpenTelemetry collector.
apiVersion: gateway.api-platform.wso2.com/v1alpha1
kind: RestApi
metadata:
  name: {{ include "wso2-amp-gateway-extension.apiGatewayName" . }}-otel-restapi
  namespace: {{ .Values.apiGateway.namespace }}
  labels:
    {{- include "wso2-amp-gateway-extension.labels" . | nindent 4 }}
    app.kubernetes.io/component: otel-restapi
    gateway.api-platform.wso2.com/restapi-target: {{ include "wso2-amp-gateway-extension.restApiTarget" . | quote }}
spec:
  displayName: {{ include "wso2-amp-gateway-extension.apiGatewayName" . }}-otel-restapi
  version: v1.0
  context: /otel
  upstream:
    main:
      url: http://opentelemetry-collector.openchoreo-observability-plane.svc.cluster.local:4318
  policies:
    - name: jwt-auth
      version: v1
      params:
        headerName: x-amp-api-key
        authHeaderPrefix: ""
        issuers:
          - agent-manager-service
        claimMappings:
          sub: x-user-id
          component_uid: x-user-component
          environment_uid: x-user-environment
          project_uid: x-user-project
  operations:
    - method: POST
      path: /v1/traces
