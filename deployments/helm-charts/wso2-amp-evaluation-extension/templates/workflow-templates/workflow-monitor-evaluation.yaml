apiVersion: openchoreo.dev/v1alpha1
kind: Workflow
metadata:
  name: monitor-evaluation-workflow
  namespace: {{ .Values.ampEvaluation.workflowNamespace | default "default" }}
  annotations:
    openchoreo.dev/description: "Periodic evaluation monitor for AI agents - runs evaluators against agent traces"
  labels:
{{- include "amp-evaluation-extension.labels" . | nindent 4 }}
spec:
  # Template Variable Reference (processed by controller):
  # ${metadata.workflowRunName}  - WorkflowRun CR name
  # ${metadata.namespaceName}    - Namespace name (organization)
  # ${parameters.*}              - Developer-provided values from parameters schema

  # Schema definition for monitor workflows
  # Note: These parameters are populated by the Go scheduler for each run
  parameters:
    openAPIV3Schema:
      type: object
      required:
        - monitor
        - agent
        - environment
        - evaluation
        - publishing
      properties:
        monitor:
          type: object
          required:
            - name
          properties:
            name:
              type: string
              description: Monitor unique name
            displayName:
              type: string
              default: ""
              description: Human-readable monitor name
        agent:
          type: object
          required:
            - id
          properties:
            id:
              type: string
              description: Agent unique identifier
        environment:
          type: object
          required:
            - id
          properties:
            id:
              type: string
              description: Environment unique identifier
        evaluation:
          type: object
          required:
            - evaluators
            - traceStart
            - traceEnd
          properties:
            evaluators:
              type: string
              description: JSON array of evaluator configs
            llmProviderConfigs:
              type: string
              default: "[]"
              description: JSON array of LLM provider credentials (envVar/value pairs)
            samplingRate:
              type: number
              default: 1.0
              description: Sampling rate for traces (0.0-1.0)
            traceStart:
              type: string
              description: Start time for trace evaluation (ISO 8601 format, calculated by scheduler)
            traceEnd:
              type: string
              description: End time for trace evaluation (ISO 8601 format, calculated by scheduler)
        publishing:
          type: object
          required:
            - monitorId
            - runId
          properties:
            monitorId:
              type: string
              description: Monitor UUID for publishing scores
            runId:
              type: string
              description: Run UUID for this evaluation execution

  # Rendered workflow resource for WorkflowRun executions
  # Each WorkflowRun creates a single Workflow (not CronWorkflow)
  # The Go scheduler creates WorkflowRuns on-demand with calculated time windows
  runTemplate:
    apiVersion: argoproj.io/v1alpha1
    kind: Workflow
    metadata:
      name: ${metadata.workflowRunName}
      namespace: ${metadata.namespace}
      labels:
        app.kubernetes.io/name: amp-monitor
        app.kubernetes.io/component: evaluation
        amp.wso2.com/monitor-name: ${parameters.monitor.name}
        amp.wso2.com/agent-id: ${parameters.agent.id}
    spec:
      serviceAccountName: workflow-sa
      arguments:
        parameters:
          - name: monitor-name
            value: ${parameters.monitor.name}
          - name: agent-id
            value: ${parameters.agent.id}
          - name: environment-id
            value: ${parameters.environment.id}
          - name: evaluators
            value: ${parameters.evaluation.evaluators}
          - name: sampling-rate
            value: ${parameters.evaluation.samplingRate}
          - name: trace-start
            value: ${parameters.evaluation.traceStart}
          - name: llm-provider-configs
            value: ${parameters.evaluation.llmProviderConfigs}
          - name: trace-end
            value: ${parameters.evaluation.traceEnd}
          - name: traces-api-endpoint
            value: {{ .Values.ampEvaluation.tracesApiEndpoint | quote }}
          - name: monitor-id
            value: ${parameters.publishing.monitorId}
          - name: run-id
            value: ${parameters.publishing.runId}
          - name: publisher-endpoint
            value: {{ .Values.ampEvaluation.publisher.endpoint | quote }}
          - name: idp-token-url
            value: {{ .Values.ampEvaluation.publisher.idpTokenUrl | quote }}
          - name: idp-client-id
            value: {{ .Values.ampEvaluation.publisher.clientId | quote }}
          - name: publisher-secret-name
            value: ${metadata.workflowRunName}-amp-publisher-credentials
      workflowTemplateRef:
        clusterScope: true
        name: amp-monitor-evaluation
  resources:
    - id: amp-publisher-credentials
      template:
        apiVersion: external-secrets.io/v1
        kind: ExternalSecret
        metadata:
          name: ${metadata.workflowRunName}-amp-publisher-credentials
          namespace: ${metadata.namespace}
        spec:
          refreshInterval: 15s
          secretStoreRef:
            name: default
            kind: ClusterSecretStore
          target:
            name: ${metadata.workflowRunName}-amp-publisher-credentials
            creationPolicy: Owner
          data:
            - secretKey: client-secret
              remoteRef:
                key: amp-publisher-client-secret
                property: value
