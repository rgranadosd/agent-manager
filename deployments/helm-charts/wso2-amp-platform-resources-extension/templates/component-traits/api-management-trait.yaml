apiVersion: openchoreo.dev/v1alpha1
kind: Trait
metadata:
  name: api-configuration
  namespace: {{ .Values.global.defaultResources.namespace }}
spec:
  parameters:
    openAPIV3Schema:
      type: object
      properties:
        apiName:
          type: string
          description: "API display name"
        apiVersion:
          type: string
          default: "v1.0"
          description: "API version"
        context:
          type: string
          description: "API context path (e.g., /greeter-api, /checkout-service)"
        upstreamPort:
          type: integer
          default: 80
          description: "Port on the service to route to"
        upstreamBasePath:
          type: string
          default: "/"
          description: "Base path on the upstream service"
        operations:
          type: array
          description: "Array of API operations"
          default:
            - method: "GET"
              path: "/*"
            - method: "POST"
              path: "/*"
            - method: "PUT"
              path: "/*"
            - method: "DELETE"
              path: "/*"
            - method: "PATCH"
              path: "/*"
            - method: "OPTIONS"
              path: "/*"
          items:
            type: object
            properties:
              method:
                type: string
              path:
                type: string
        policies:
          type: array
          description: "Array of policies to apply"
          default: []
          items:
            type: object
            x-kubernetes-preserve-unknown-fields: true
        artifactId:
          type: string
          description: "Artifact UUID injected as gateway.api-platform.wso2.com/artifact-id annotation on the RestApi"
          default: ""
      required:
        - apiName

  environmentConfigs:
    openAPIV3Schema:
      type: object
      properties:
        policies:
          type: array
          description: "Environment-specific policies (CORS, API key auth, etc.)"
          items:
            type: object
            x-kubernetes-preserve-unknown-fields: true
        artifactId:
          type: string
          description: "Per-environment artifact UUID override. When set, takes precedence over parameters.artifactId."
          default: ""

  creates:
    # --- Backend: kgateway static backend pointing to WSO2 API Platform router ---
    # This Backend resource tells kgateway to forward traffic to the WSO2 API Platform
    # router instead of directly to the component's Service. The HTTPRoute's backendRef
    # is patched (below) to reference this Backend.
    #
    # backendHost is derived from the chart's apiGatewayName helper convention
    # ("api-platform-<org>-<env>") + the in-cluster Service suffix, and backendPort
    # is the gateway runtime listener port. Both are platform-wide constants —
    # the agent-manager-service no longer injects them per-environment.
    - template:
        apiVersion: gateway.kgateway.dev/v1alpha1
        kind: Backend
        metadata:
          name: ${metadata.componentName}-api-gw-backend
          namespace: ${metadata.namespace}
        spec:
          type: Static
          static:
            hosts:
              - host: "api-platform-${metadata.componentNamespace}-${metadata.environmentName}-gateway-gateway-runtime.openchoreo-data-plane"
                port: 22893

    # Create RestApi resource (discovered by gateway via apiSelector scope: LabelSelector).
    # The restapi-target label matches the gateway's apiSelector matchLabels (which the chart
    # sets to the same "api-platform-<org>-<env>" string via the apiGatewayName helper).
    - template:
        apiVersion: gateway.api-platform.wso2.com/v1alpha1
        kind: RestApi
        metadata:
          name: ${metadata.name}
          namespace: ${metadata.namespace}
          labels:
            gateway.api-platform.wso2.com/restapi-target: "api-platform-${metadata.componentNamespace}-${metadata.environmentName}"
          annotations:
            gateway.api-platform.wso2.com/artifact-id: "${has(environmentConfigs.artifactId) && environmentConfigs.artifactId != '' ? environmentConfigs.artifactId : parameters.artifactId}"
        spec:
          displayName: ${parameters.apiName}-${metadata.environmentName}
          version: ${parameters.apiVersion}
          context: /${metadata.environmentName}-${metadata.componentNamespace}-${metadata.componentName}
          upstream:
            main:
              url: http://${metadata.componentName}.${metadata.namespace}:${parameters.upstreamPort}${parameters.upstreamBasePath}
          policies: |
            ${has(environmentConfigs.policies) ? dyn(environmentConfigs.policies) : dyn(parameters.policies)}
          operations: ${parameters.operations}

  patches:
    # --- Patch HTTPRoute: Route traffic through WSO2 API Platform router ---
    # Keeps the original Service backendRef (weight 0) so the endpoint resolver can
    # still match the port to generate invoke URLs. Adds a Backend backendRef (weight 100)
    # that routes all traffic through the WSO2 API Platform router for policy enforcement.
    - target:
        group: gateway.networking.k8s.io
        version: v1
        kind: HTTPRoute
      operations:
        # Set original Service backendRef to weight 0 (keeps port for endpoint URL resolution)
        - op: replace
          path: /spec/rules/0/backendRefs/[?(@.name=='${metadata.componentName}')]
          value:
            name: ${metadata.componentName}
            port: ${parameters.upstreamPort}
            weight: 0
        # Add Backend backendRef with weight 100 (all traffic goes through API gateway)
        - op: add
          path: /spec/rules/0/backendRefs/-
          value:
            group: gateway.kgateway.dev
            kind: Backend
            name: ${metadata.componentName}-api-gw-backend
            weight: 100

    # --- Patch HTTPRoute: Replace filters array — set URL rewrite to API context path and remove CORS filter ---
    # CORS is now handled by the cors policy in the RestApi (see policies parameter).
        - op: replace
          path: /spec/rules/0/filters
          value:
            - type: URLRewrite
              urlRewrite:
                path:
                  type: ReplacePrefixMatch
                  replacePrefixMatch: /${metadata.environmentName}-${metadata.componentNamespace}-${metadata.componentName}
