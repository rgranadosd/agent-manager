apiVersion: openchoreo.dev/v1alpha1
kind: Trait
metadata:
  name: python-otel-instrumentation-trait
  namespace: {{ .Values.global.defaultResources.namespace }}
  annotations:
    openchoreo.dev/description: "Trait to add an init container for setting up OpenTelemetry instrumentation in Python applications"
spec:
  parameters:
    openAPIV3Schema:
      type: object
      properties:
        instrumentationImage:
          type: string
          description: "Container image for the OpenTelemetry instrumentation setup"
        sdkVolumeName:
          type: string
          default: "otel-tracing-sdk-volume"
          description: "Name of the volume for SDK files"
        sdkMountPath:
          type: string
          default: "/otel-tracing-sdk"
          description: "Mount path for SDK in containers"
        isTraceContentEnabled:
          type: string
          default: "true"
          description: "Flag to enable or disable tracing of content"
        instrumentationEnabled:
          type: boolean
          default: true
          description: "Enable or disable OTEL instrumentation"
      required:
        - instrumentationImage

  environmentConfigs:
    openAPIV3Schema:
      type: object
      properties:
        instrumentationEnabled:
          type: boolean
          description: "Enable or disable OTEL instrumentation for this environment"
        isTraceContentEnabled:
          type: string
          default: "true"
          description: "Flag to enable or disable tracing of content for this environment"

  # Patches to modify the Deployment resource.
  # AMP_OTEL_ENDPOINT and AMP_AGENT_API_KEY are always injected by
  # instrumentation-trait-env-injection to avoid duplicates when both
  # traits are attached (includeWhen is not enforced on patches).
  patches:
    - target:
        kind: Deployment
        group: apps
        version: v1
        where: |
          ${has(environmentConfigs.instrumentationEnabled) ? environmentConfigs.instrumentationEnabled : parameters.instrumentationEnabled}
      operations:
        # 1. Add init container to spec.template.spec.initContainers
        - op: add
          path: /spec/template/spec/initContainers/-
          value:
            name: setup-instrumentation
            image: ${parameters.instrumentationImage}
            imagePullPolicy: IfNotPresent
            volumeMounts:
              - name: ${parameters.sdkVolumeName}
                mountPath: ${parameters.sdkMountPath}

        # 2. Add emptyDir volume for sharing SDK files
        - op: add
          path: /spec/template/spec/volumes/-
          value:
            name: ${parameters.sdkVolumeName}
            emptyDir: {}

        # 3. Add volume mount to main container
        - op: add
          path: /spec/template/spec/containers/0/volumeMounts/-
          value:
            name: ${parameters.sdkVolumeName}
            mountPath: ${parameters.sdkMountPath}
            readOnly: true

        # 4. Set OTEL-specific environment variables
        - op: add
          path: /spec/template/spec/containers/0/env/-
          value:
            name: AMP_TRACE_CONTENT
            value: "${has(environmentConfigs.isTraceContentEnabled) ? environmentConfigs.isTraceContentEnabled : parameters.isTraceContentEnabled}"
        - op: add
          path: /spec/template/spec/containers/0/env/-
          value:
            name: PYTHONPATH
            value: "${parameters.sdkMountPath}"
