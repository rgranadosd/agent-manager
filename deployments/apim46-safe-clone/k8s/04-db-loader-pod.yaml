apiVersion: v1
kind: Pod
metadata:
  name: apim46-lab-db-loader
  namespace: apim46-lab
spec:
  restartPolicy: Never
  containers:
    - name: loader
      image: busybox:1.36.1
      command:
        - sh
        - -c
        - sleep 86400
      volumeMounts:
        - name: database
          mountPath: /restore
  volumes:
    - name: database
      persistentVolumeClaim:
        claimName: apim46-lab-db